; PlatformIO Project Configuration File
;
; Cible : Quoridor mecatronique - firmware ESP32-WROOM (Freenove)
; Plan 1 : squelette + FSM globale + integration FreeRTOS
;
; Documentation : https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Vitesse de communication serie (matche Serial.begin dans main.cpp)
monitor_speed = 115200

; Vitesse d'upload (USB direct - 460800 stable, monter a 921600 si besoin)
upload_speed = 460800

; Filtre direct = output brut sans timestamp ajoute
monitor_filters = direct

; Build flags
build_flags =
  -Wall
  -Wno-unused-parameter
